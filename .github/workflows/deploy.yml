name: Build & Deploy Backend to VPS

on:
  push:
    branches: [ "main", "qa" ] # הוספנו את הבראנץ' החדש

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: amitisho-droid/macbook-back-template

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # בוחר תגית אוטומטית לפי הבראנץ'
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name == 'main' && 'latest' || 'qa' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # אם אנחנו בבראנץ' הראשי - מעדכנים את סביבת הפיתוח
            if [ "${{ github.ref_name }}" == "main" ]; then
              cd /opt/app
              docker compose pull backend
              docker compose up -d backend
            
            # אם אנחנו ב-QA - מעדכנים גם את QA וגם את האוטומציה
            elif [ "${{ github.ref_name }}" == "qa" ]; then
              # סביבת QA
              cd /opt/app/daba-qa
              docker compose pull daba-backend-qa
              docker compose up -d daba-backend-qa
              
              # סביבת אוטומציה
              cd /opt/app/daba-auto
              docker compose pull daba-backend-auto
              docker compose up -d daba-backend-auto
            fi
            
            docker image prune -af
