name: Deploy Backend

on:
  push:
    branches: [main, qa]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: dabaservices/macbook-back-template

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name == 'main' && 'latest' || 'qa' }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            if [ "${{ github.ref_name }}" == "main" ]; then
              cd /opt/app/daba-system && docker compose pull backend && docker compose up -d backend
            elif [ "${{ github.ref_name }}" == "qa" ]; then
              cd /opt/app/daba-qa && docker compose pull backend && docker compose up -d backend
              cd /opt/app/daba-auto && docker compose pull backend && docker compose up -d backend
            fi
            docker image prune -af
